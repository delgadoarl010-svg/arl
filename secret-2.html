<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Crush</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    font-family:Arial,sans-serif;
}

#btn{
    position:absolute;
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:40px;
    background:#fff;
    color:#ff4f7b;
    font-weight:bold;
    cursor:pointer;
    transition:all .35s ease;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.hidden{
    display:none;
}

.heart-container{
    text-align:center;
    animation:showUp 1s ease;
}

.heart{
    position:relative;
    width:220px;
    height:220px;
    background:#ff4f7b;
    transform:rotate(-45deg);
    margin:auto;
    animation:heartbeat 1s infinite;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:#ff4f7b;
    border-radius:50%;
}

.heart::before{
    top:-110px;
    left:0;
}

.heart::after{
    left:110px;
    top:0;
}

.message{
    margin-top:80px;
    font-size:50px;
    color:white;
    font-weight:bold;
    text-shadow:0 0 15px rgba(255,255,255,.8);
}

.floating-heart{
    position:absolute;
    color:#ff4f7b;
    font-size:25px;
    animation:float 4s linear forwards;
}

@keyframes heartbeat{
    0%,100%{
        transform:rotate(-45deg) scale(0.9);
    }
    50%{
        transform:rotate(-45deg) scale(1.1);
    }
}

@keyframes showUp{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes float{
    from{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    to{
        opacity:0;
        transform:translateY(-400px) scale(2);
    }
}
</style>
</head>
<body>

<button id="btn">Don't Click Me 😜</button>

<div id="surprise" class="heart-container hidden">
    <div class="heart"></div>
    <div class="message">❤️ I Like You ❤️</div>
</div>

<script>
const btn = document.getElementById("btn");
const surprise = document.getElementById("surprise");

let dodgeCount = 0;

btn.addEventListener("mouseover", () => {

    if(dodgeCount < 3){

        const x = Math.random() * (window.innerWidth - 200);
        const y = Math.random() * (window.innerHeight - 100);

        btn.style.left = x + "px";
        btn.style.top = y + "px";

        dodgeCount++;

        if(dodgeCount === 1) btn.innerText = "Nope 😂";
        if(dodgeCount === 2) btn.innerText = "Still No 😆";
        if(dodgeCount === 3) btn.innerText = "Okay Fine 😳";
    }
});

btn.addEventListener("click", () => {

    btn.style.display = "none";

    // Heart explosion
    for(let i=0;i<80;i++){
        const heart = document.createElement("div");
        heart.classList.add("floating-heart");
        heart.innerHTML = "💖";

        heart.style.left =
            (window.innerWidth/2 + (Math.random()*300-150))
            + "px";

        heart.style.top =
            (window.innerHeight/2 + (Math.random()*150))
            + "px";

        heart.style.fontSize =
            (20 + Math.random()*30) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }

    surprise.classList.remove("hidden");
});
</script>

</body>
</html>
